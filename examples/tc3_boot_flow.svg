<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 726" width="400" height="726">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A5568"/>
    </marker>
  </defs>

  <!-- Layer 1: Background -->
  <g id="background">
    <rect x="0" y="0" width="400" height="726" fill="#FFFFFF"/>
  </g>

  <!-- Layer 2: Containers (group zones) -->
  <g id="containers">
    <rect x="50" y="52" width="300" height="168" rx="10" fill="#F0F3F7"/>
    <rect x="50" y="250" width="300" height="248" rx="10" fill="#F2EFF8"/>
    <rect x="50" y="528" width="300" height="168" rx="10" fill="#EEF3FA"/>
  </g>

  <!-- Layer 3: Nodes (all component boxes) -->
  <g id="nodes">
    <!-- System Controllers -->
    <rect x="100" y="80" width="200" height="50" rx="8" fill="#6B7B8D" stroke="#4A5568" stroke-width="2"/>
    <rect x="100" y="160" width="200" height="50" rx="8" fill="#6B7B8D" stroke="#4A5568" stroke-width="2"/>
    <!-- Secure Firmware -->
    <rect x="100" y="278" width="200" height="50" rx="8" fill="#8B6BB5" stroke="#6B4E91" stroke-width="2"/>
    <rect x="100" y="358" width="200" height="50" rx="8" fill="#8B6BB5" stroke="#6B4E91" stroke-width="2"/>
    <rect x="100" y="438" width="200" height="50" rx="8" fill="#8B6BB5" stroke="#6B4E91" stroke-width="2"/>
    <!-- Application -->
    <rect x="100" y="556" width="200" height="50" rx="8" fill="#E8854A" stroke="#C46A2F" stroke-width="2"/>
    <rect x="100" y="636" width="200" height="50" rx="8" fill="#4A90D9" stroke="#2D6CB4" stroke-width="2"/>
  </g>

  <!-- Layer 4: Labels (all text) -->
  <g id="labels">
    <!-- Title -->
    <text x="200" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="18" font-weight="bold" fill="#1A202C">TC3 FVP Boot Flow</text>

    <!-- Group labels (left-aligned to avoid center arrow path) -->
    <text x="66" y="70" text-anchor="start" font-family="Arial, Helvetica, sans-serif"
          font-size="12" font-weight="bold" fill="#4A5568">System Controllers</text>
    <text x="66" y="268" text-anchor="start" font-family="Arial, Helvetica, sans-serif"
          font-size="12" font-weight="bold" fill="#6B4E91">Secure Firmware</text>
    <text x="66" y="546" text-anchor="start" font-family="Arial, Helvetica, sans-serif"
          font-size="12" font-weight="bold" fill="#2D6CB4">Application</text>

    <!-- Node labels: System Controllers -->
    <text x="200" y="100" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="14" font-weight="bold" fill="#FFFFFF">RSE</text>
    <text x="200" y="116" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="10" fill="#E2E8F0">Cortex-M55</text>
    <text x="200" y="180" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="14" font-weight="bold" fill="#FFFFFF">SCP</text>
    <text x="200" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="10" fill="#E2E8F0">Cortex-M85</text>

    <!-- Node labels: Secure Firmware -->
    <text x="200" y="308" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="14" font-weight="bold" fill="#FFFFFF">TF-A BL1</text>
    <text x="200" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="14" font-weight="bold" fill="#FFFFFF">TF-A BL2</text>
    <text x="200" y="458" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="14" font-weight="bold" fill="#FFFFFF">BL31</text>
    <text x="200" y="474" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="10" fill="#E2E8F0">Hafnium (SPM)</text>

    <!-- Node labels: Application -->
    <text x="200" y="586" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="14" font-weight="bold" fill="#FFFFFF">U-Boot</text>
    <text x="200" y="666" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="14" font-weight="bold" fill="#FFFFFF">Linux Kernel</text>
  </g>

  <!-- Layer 5: Connections (ALL arrows — last, rendered on top) -->
  <g id="connections">
    <!-- Intra-group: System Controllers -->
    <line x1="200" y1="130" x2="200" y2="160" stroke="#4A5568" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Cross-group: System Controllers → Secure Firmware -->
    <line x1="200" y1="210" x2="200" y2="278" stroke="#4A5568" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Intra-group: Secure Firmware -->
    <line x1="200" y1="328" x2="200" y2="358" stroke="#4A5568" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="200" y1="408" x2="200" y2="438" stroke="#4A5568" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Cross-group: Secure Firmware → Application -->
    <line x1="200" y1="488" x2="200" y2="556" stroke="#4A5568" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Intra-group: Application -->
    <line x1="200" y1="606" x2="200" y2="636" stroke="#4A5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

</svg>
