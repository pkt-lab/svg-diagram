<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 644" width="500" height="644">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A5568"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C53030"/>
    </marker>
  </defs>

  <!-- Layer 1: Background -->
  <g id="background">
    <rect x="0" y="0" width="500" height="644" fill="#FFFFFF"/>
  </g>

  <!-- Layer 2: Containers -->
  <g id="containers">
    <rect x="126" y="280" width="252" height="262" rx="12" fill="#F0F8F5" stroke-dasharray="6,3" stroke="#3A8F85" stroke-width="1"/>
  </g>

  <!-- Layer 3: Nodes -->
  <g id="nodes">
    <rect x="150" y="50"  width="200" height="44" rx="8" fill="#E8854A" stroke="#C46A2F" stroke-width="2"/>
    <rect x="150" y="124" width="200" height="44" rx="8" fill="#8B6BB5" stroke="#6B4E91" stroke-width="2"/>
    <rect x="150" y="198" width="200" height="48" rx="8" fill="#4A90D9" stroke="#2D6CB4" stroke-width="2"/>
    <rect x="150" y="308" width="200" height="48" rx="8" fill="#50B5A9" stroke="#3A8F85" stroke-width="2"/>
    <rect x="150" y="386" width="200" height="48" rx="8" fill="#50B5A9" stroke="#3A8F85" stroke-width="2"/>
    <rect x="150" y="464" width="200" height="48" rx="8" fill="#50B5A9" stroke="#3A8F85" stroke-width="2"/>
    <rect x="150" y="570" width="200" height="44" rx="8" fill="#48BB78" stroke="#2F855A" stroke-width="2"/>
  </g>

  <!-- Layer 4: Labels -->
  <g id="labels">
    <text x="250" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="16" font-weight="bold" fill="#1A202C">svg-diagram Skill Architecture</text>

    <!-- Container label -->
    <text x="140" y="296" text-anchor="start" font-family="Arial, Helvetica, sans-serif"
          font-size="10" font-weight="bold" fill="#3A8F85">Validation Loop</text>

    <!-- Node labels -->
    <text x="250" y="77" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="13" font-weight="bold" fill="#FFFFFF">User Request</text>

    <text x="250" y="151" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="13" font-weight="bold" fill="#FFFFFF">SKILL.md Rules</text>

    <text x="250" y="217" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="13" font-weight="bold" fill="#FFFFFF">Generate SVG</text>
    <text x="250" y="233" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="10" fill="#D4E5F7">Claude Code</text>

    <text x="250" y="327" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="13" font-weight="bold" fill="#FFFFFF">Structural Check</text>
    <text x="250" y="343" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="10" fill="#E0F5F0">validate_svg.py</text>

    <text x="250" y="405" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="13" font-weight="bold" fill="#FFFFFF">Render to PNG</text>
    <text x="250" y="421" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="10" fill="#E0F5F0">render_svg.py</text>

    <text x="250" y="483" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="13" font-weight="bold" fill="#FFFFFF">Visual Self-Review</text>
    <text x="250" y="499" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="10" fill="#E0F5F0">Claude reads PNG</text>

    <text x="250" y="597" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="13" font-weight="bold" fill="#FFFFFF">Deliver to User</text>

    <!-- Feedback label -->
    <text x="430" y="258" text-anchor="start" font-family="Arial, Helvetica, sans-serif"
          font-size="10" font-weight="bold" fill="#C53030">Fix</text>

    <!-- Pass label -->
    <text x="230" y="554" text-anchor="end" font-family="Arial, Helvetica, sans-serif"
          font-size="10" fill="#2F855A">Pass</text>
  </g>

  <!-- Layer 5: Connections (LAST) -->
  <g id="connections">
    <!-- Main flow -->
    <line x1="250" y1="94"  x2="250" y2="124" stroke="#4A5568" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="250" y1="168" x2="250" y2="198" stroke="#4A5568" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="250" y1="246" x2="250" y2="308" stroke="#4A5568" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="250" y1="356" x2="250" y2="386" stroke="#4A5568" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="250" y1="434" x2="250" y2="464" stroke="#4A5568" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="250" y1="512" x2="250" y2="570" stroke="#4A5568" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Feedback loop: Visual Review → Generate SVG (right side) -->
    <path d="M 350 488 L 410 488 L 410 222 L 350 222"
          fill="none" stroke="#C53030" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead-red)"/>
  </g>

</svg>
